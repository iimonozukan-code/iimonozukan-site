name: Enrich products (Amazon)
on:
  workflow_dispatch:
jobs:
  enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: "readdy-project 3"
        run: npm install --no-audit --no-fund
      - name: Run enrichment
        working-directory: "readdy-project 3"
        env:
          PAAPI_ACCESS_KEY: ${{ secrets.PAAPI_ACCESS_KEY }}
          PAAPI_SECRET_KEY: ${{ secrets.PAAPI_SECRET_KEY }}
          PAAPI_PARTNER_TAG: iimonozukan-media-22
        run: npm run enrich:amazon -- --all
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r --cached "readdy-project 3/node_modules" > /dev/null 2>&1 || true
          git add "readdy-project 3/src/mocks/products.ts"
          git commit -m "Refresh Amazon images via PA-API" || echo "No changes"
          git push
